name: SwiftLM Integration Tests

on:
  pull_request:
    branches: [ main, feature/* ]
  push:
    branches: [ main ]

jobs:
  integration-test:
    runs-on: self-hosted
    steps:
      - name: Checkout mlx-swift (this repository)
        uses: actions/checkout@v4
        with:
          path: mlx-swift
          submodules: recursive

      - name: Checkout SwiftLM
        uses: actions/checkout@v4
        with:
          repository: SharpAI/SwiftLM
          path: SwiftLM
          submodules: recursive

      - name: Redirect SwiftLM to local mlx-swift
        run: |
          cd SwiftLM
          
          # Since SwiftLM explicitly links to mlx-swift-lm via Package.swift, we need to
          # either edit Package.swift to point to the local mlx-swift, or edit the nested
          # dependency of mlx-swift-lm if using Swift Package Manager local override.
          
          # We can use swift package config to use local checked out packages
          swift package edit mlx-swift --path ../mlx-swift
          
      - name: Build SwiftLM
        run: |
          cd SwiftLM
          swift build -c release

      - name: Run Speculative Decoding Tests
        run: |
          cd SwiftLM
          bash tests/test-speculative-eval.sh
